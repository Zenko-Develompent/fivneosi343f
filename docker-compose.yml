version: "3.9"

services:
  db:
    image: postgres:17
    container_name: oknez_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: oknez
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: oknez_backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./back/.env
    ports:
      - "8000:8000"
    volumes:
      - ./back:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: